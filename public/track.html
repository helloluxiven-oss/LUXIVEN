<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxiven — Track Your Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--ink:#0A0806;--ink3:#1C1209;--cream:#F7F3EE;--muted:#8C7B5E;--border:rgba(201,169,110,.2);--success:#4CAF50}
html,body{min-height:100%}
body{background:var(--ink);color:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300}
nav{background:rgba(10,8,6,.95);border-bottom:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.28em;color:var(--gold);text-decoration:none;text-transform:uppercase}
.back{font-size:10px;letter-spacing:.25em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .3s}
.back:hover{color:var(--gold)}
.wrap{max-width:700px;margin:0 auto;padding:80px 24px}
.page-eyebrow{font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:block}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,64px);font-weight:300;color:var(--cream);margin-bottom:12px;line-height:1}
.page-sub{font-size:12px;color:var(--muted);line-height:1.9;margin-bottom:48px}
.search-box{background:var(--ink3);border:1px solid var(--border);padding:40px;margin-bottom:40px}
.search-title{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:block}
.field{margin-bottom:20px}
.field label{display:block;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:14px 16px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;transition:border-color .3s}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:rgba(140,123,94,.5)}
.track-btn{width:100%;background:var(--gold);color:var(--ink);border:none;padding:16px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .4s;margin-top:8px}
.track-btn:hover{background:var(--gold-light)}
.track-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);padding:14px 18px;font-size:12px;color:#EF9A9A;margin-bottom:20px;display:none}
.error-msg.show{display:block}

/* Results */
#result{display:none}
#result.show{display:block}
.order-card{background:var(--ink3);border:1px solid var(--border);padding:36px;margin-bottom:20px}
.order-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--gold);margin-bottom:4px}
.order-date{font-size:10px;color:var(--muted);letter-spacing:.15em;margin-bottom:28px}
.status-bar{margin-bottom:36px}
.status-steps{display:flex;align-items:flex-start;gap:0;position:relative;margin-bottom:16px}
.status-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.step-line{position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--border);z-index:0}
.step-line.done{background:linear-gradient(to right,var(--gold),var(--gold-light))}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:1;transition:all .4s}
.step-circle.done{background:var(--gold);border-color:var(--gold)}
.step-circle.active{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,.15)}
.step-circle svg{width:12px;height:12px;fill:none;stroke:var(--ink);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.step-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.4;margin-top:4px}
.step-label.active,.step-label.done{color:var(--gold)}
.cancelled-banner{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);padding:16px 20px;text-align:center;color:#EF9A9A;font-size:12px;letter-spacing:.1em;margin-bottom:24px}

.section-title{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:block}
.items-list{margin-bottom:28px}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(201,169,110,.06);font-size:12px}
.item-row:last-child{border-bottom:none}
.item-name{color:var(--cream)}
.item-qty{color:var(--muted);margin:0 16px}
.item-price{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:18px}
.totals{text-align:right;padding-top:16px;border-top:1px solid var(--border)}
.total-row{font-size:12px;color:var(--muted);margin-bottom:6px}
.total-final{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--gold);margin-top:10px}

.tracking-info{background:rgba(201,169,110,.06);border:1px solid var(--border);padding:20px 24px;margin-bottom:20px}
.track-carrier{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.track-num{font-size:18px;color:var(--cream);margin-bottom:10px;font-family:'Cormorant Garamond',serif}
.track-link{display:inline-block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid var(--border);padding:8px 20px;text-decoration:none;transition:all .3s}
.track-link:hover{background:var(--gold);color:var(--ink)}

.timeline{margin-top:8px}
.tl-item{display:flex;gap:14px;margin-bottom:16px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:3px}
.tl-content{flex:1}
.tl-status{font-size:12px;color:var(--cream);text-transform:capitalize;margin-bottom:2px}
.tl-note{font-size:11px;color:var(--muted)}
.tl-time{font-size:10px;color:var(--muted2);margin-top:2px}
.addr-block{font-size:12px;color:var(--muted);line-height:1.9}

footer{text-align:center;padding:48px;border-top:1px solid var(--border);margin-top:80px}
.foot-logo{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:.25em;color:var(--gold);display:block;margin-bottom:12px}
.foot-copy{font-size:10px;color:var(--muted2);letter-spacing:.15em}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Luxiven</a>
  <a href="/" class="back">← Back to Store</a>
</nav>

<div class="wrap">
  <span class="page-eyebrow">Order Tracking</span>
  <h1 class="page-title">Where is<br>my order?</h1>
  <p class="page-sub">Enter your order number and the email address used at checkout to get the latest status on your delivery.</p>

  <div class="search-box">
    <span class="search-title">Track Your Order</span>
    <div class="error-msg" id="err-msg"></div>
    <div class="field">
      <label>Order Number</label>
      <input type="text" id="order-num" placeholder="LUX-ABC123-XYZ" autocomplete="off">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="order-email" placeholder="your@email.com" autocomplete="off">
    </div>
    <button class="track-btn" id="track-btn" onclick="trackOrder()">Track Order</button>
  </div>

  <div id="result">
    <div class="order-card" id="order-detail"></div>
  </div>
</div>

<footer>
  <span class="foot-logo">Luxiven</span>
  <span class="foot-copy">© 2024 Luxiven · Premium Living</span>
</footer>

<script>
const STATUS_STEPS = ['confirmed','processing','shipped','delivered'];
const fmt = n => '$'+Number(n||0).toFixed(2);
const fmtD = d => d ? new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'}) : '—';

// Pre-fill from URL params
const params = new URLSearchParams(location.search);
if (params.get('order')) document.getElementById('order-num').value = params.get('order');
if (params.get('email')) document.getElementById('order-email').value = params.get('email');
if (params.get('order') && params.get('email')) setTimeout(trackOrder, 400);

async function trackOrder() {
  const num   = document.getElementById('order-num').value.trim().toUpperCase();
  const email = document.getElementById('order-email').value.trim();
  const errEl = document.getElementById('err-msg');
  errEl.classList.remove('show');

  if (!num || !email) { errEl.textContent='Please enter both order number and email.'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('track-btn');
  btn.disabled=true; btn.textContent='Searching…';

  try {
    const res  = await fetch(`/api/orders/track/${num}?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    renderResult(data.data);
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
    history.replaceState(null,'',`?order=${num}&email=${encodeURIComponent(email)}`);
  } catch(err) {
    errEl.textContent=err.message||'Order not found. Please check your details.';
    errEl.classList.add('show');
    document.getElementById('result').classList.remove('show');
  } finally { btn.disabled=false; btn.textContent='Track Order'; }
}

document.getElementById('order-num').addEventListener('keydown', e=>e.key==='Enter'&&trackOrder());
document.getElementById('order-email').addEventListener('keydown', e=>e.key==='Enter'&&trackOrder());

function renderResult(o) {
  const isCancelled = o.status==='cancelled';
  const stepIdx     = STATUS_STEPS.indexOf(o.status);

  const stepsHtml = STATUS_STEPS.map((step, i) => {
    const done   = stepIdx>i || stepIdx===-1&&isCancelled?false:i<=stepIdx;
    const active = i===stepIdx;
    const isLast = i===STATUS_STEPS.length-1;
    return `<div class="status-step">
      ${!isLast?`<div class="step-line ${done?'done':''}"></div>`:''}
      <div class="step-circle ${done?'done':active?'active':''}">
        ${done?`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}
      </div>
      <div class="step-label ${done||active?'done':''}">
        ${step==='confirmed'?'Confirmed':step==='processing'?'Processing':step==='shipped'?'Shipped':'Delivered'}
      </div>
    </div>`;
  }).join('');

  const itemsHtml = (o.items||[]).map(i=>`
    <div class="item-row">
      <span class="item-name">${i.name}${i.variant?` <small style="color:var(--muted)">(${i.variant})</small>`:''}</span>
      <span class="item-qty">×${i.quantity}</span>
      <span class="item-price">${fmt(i.price*i.quantity)}</span>
    </div>`).join('');

  const timelineHtml = (o.timeline||[]).slice().reverse().map(t=>`
    <div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-content">
        <div class="tl-status">${t.status}</div>
        ${t.note?`<div class="tl-note">${t.note}</div>`:''}
        <div class="tl-time">${fmtD(t.at)}</div>
      </div>
    </div>`).join('');

  const addr = o.shippingAddress||{};
  const addrHtml = `${addr.firstName||''} ${addr.lastName||''}<br>${addr.line1||''}${addr.line2?', '+addr.line2:''}<br>${addr.city||''}, ${addr.state||''} ${addr.zip||''}`;

  document.getElementById('order-detail').innerHTML=`
    <div class="order-num">${o.orderNumber}</div>
    <div class="order-date">Placed ${fmtD(o.createdAt)}</div>

    ${isCancelled?'<div class="cancelled-banner">⚠ This order has been cancelled</div>':''}

    ${!isCancelled?`
    <span class="section-title">Delivery Status</span>
    <div class="status-bar"><div class="status-steps">${stepsHtml}</div></div>`:''}

    ${o.trackingNumber?`
    <div class="tracking-info">
      <div class="track-carrier">${o.trackingCarrier||'Carrier'}</div>
      <div class="track-num">${o.trackingNumber}</div>
      ${o.trackingUrl?`<a href="${o.trackingUrl}" class="track-link" target="_blank" rel="noopener">Track on Carrier Site →</a>`:''}
    </div>`:''}

    <span class="section-title" style="margin-top:28px;display:block">Items in Your Order</span>
    <div class="items-list">${itemsHtml}</div>
    <div class="totals">
      <div class="total-row">Subtotal: ${fmt(o.subtotal||o.total)}</div>
      ${o.discount>0?`<div class="total-row" style="color:var(--gold)">Discount: -${fmt(o.discount)}</div>`:''}
      <div class="total-row">Shipping: ${o.shipping===0?'Free':fmt(o.shipping)}</div>
      <div class="total-row">Tax: ${fmt(o.tax||0)}</div>
      <div class="total-final">Total: ${fmt(o.total)}</div>
    </div>

    ${addr.line1?`
    <div style="margin-top:28px;padding-top:24px;border-top:1px solid var(--border)">
      <span class="section-title">Shipping To</span>
      <div class="addr-block">${addrHtml}</div>
    </div>`:''}

    ${timelineHtml?`
    <div style="margin-top:28px;padding-top:24px;border-top:1px solid var(--border)">
      <span class="section-title">Order Timeline</span>
      <div class="timeline">${timelineHtml}</div>
    </div>`:''}

    <div style="margin-top:32px;text-align:center">
      <a href="/" style="display:inline-block;border:1px solid var(--border);color:var(--gold);padding:12px 36px;font-size:10px;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;transition:all .3s" onmouseover="this.style.background='var(--gold)';this.style.color='var(--ink)'" onmouseout="this.style.background='transparent';this.style.color='var(--gold)'">Continue Shopping</a>
    </div>`;
}
</script>
</body>
</html>
